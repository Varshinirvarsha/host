<form id="signupForm">
<div class="formcard">
<h2>Create Account</h2>
        <form>
            <div class="input-group">
                
                <input type="text" placeholder="e.g. John Doe" required></br>
            </div></br>
            <div class="input-group">
                <label>Phone Number</label></br></br>
                <input type="tel" placeholder="+1 (555) 000-0000" required></br>
            </div></br>
            <div class="input-group">
                <label>Email Address</label></br></br>
                <input type="email" placeholder="name@company.com" required></br>
            </div></br>
            <div class="input-group">
                <label>Password</label></br></br>
                <input type="password" placeholder="••••••••" required></br>
            </div></br></br>
            <button type="submit">Sign Up</button></br></br>
        </form>
        <p class="footer-text">Already have an account? <a href="#"><a href="signin.html">Sign In</a></a></p>
        
    </div>
</div>
</form>
<script>
function saveAndRedirect() {
    // 1. Get the values from the inputs
    const name = document.getElementById('fullName').value;
    const phone = document.getElementById('phone').value;
    const email = document.getElementById('email').value;

    // 2. Store them in localStorage
    localStorage.setItem('userName', name);
    localStorage.setItem('userPhone', phone);
    localStorage.setItem('userEmail', email);

    // 3. Move to the profile page
    window.location.href = "profile.html"; 

}
